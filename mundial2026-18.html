<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Mundial Fan 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0C96B;
    --dark: #0a0e1a;
    --dark2: #111827;
    --dark3: #1c2537;
    --accent: #3B6FE0;
    --text: #e8eaf0;
    --text-muted: #8892a4;
    --green: #22c55e;
    --border: rgba(201,168,76,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .hero { position: relative; background: linear-gradient(135deg, #0a0e1a 0%, #0d1829 40%, #111827 100%); padding: 20px 20px 40px; text-align: center; border-bottom: 1px solid var(--border); overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 65%); pointer-events: none; }
  .hero-trophy { font-size: 56px; animation: float 3s ease-in-out infinite; display: block; margin-bottom: 8px; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 7vw, 68px); letter-spacing: 4px; background: linear-gradient(135deg, var(--gold-light), var(--gold), #a07830); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
  .hero-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 6px; color: var(--text-muted); text-transform: uppercase; margin: 6px 0 16px; }
  .countdown { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
  .cd-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 64px; text-align: center; }
  .cd-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); line-height: 1; }
  .cd-label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .start-badge { display: inline-block; background: linear-gradient(135deg, var(--gold), #a07830); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 2px; padding: 4px 14px; border-radius: 20px; margin-top: 12px; text-transform: uppercase; }
  nav { display: flex; overflow-x: auto; gap: 4px; padding: 12px 16px; background: var(--dark2); border-bottom: 1px solid var(--border); scrollbar-width: none; position: sticky; top: 0; z-index: 100; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn { flex-shrink: 0; background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; padding: 7px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .nav-btn:hover, .nav-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }
  .section { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .section.active { display: block; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 2px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .group-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .group-tab { background: var(--dark3); border: 1px solid var(--border); color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .group-tab:hover, .group-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .standings-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .standings-header { background: linear-gradient(90deg, var(--dark3), var(--dark2)); padding: 12px 16px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--gold); border-bottom: 1px solid var(--border); }
  .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .standings-table th { background: rgba(255,255,255,0.03); color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .standings-table th:first-child { text-align: left; padding-left: 16px; }
  .standings-table td { padding: 9px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: 'Barlow', sans-serif; }
  .standings-table td:first-child { text-align: left; padding-left: 16px; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:nth-child(1) td:first-child::before,
  .standings-table tr:nth-child(2) td:first-child::before { content: ''; display: inline-block; width: 3px; height: 16px; background: var(--green); border-radius: 2px; margin-right: 8px; vertical-align: middle; }
  .standings-table tr:nth-child(3) td:first-child::before { content: ''; display: inline-block; width: 3px; height: 16px; background: var(--gold); border-radius: 2px; margin-right: 8px; vertical-align: middle; }
  .team-cell { display: flex; align-items: center; gap: 8px; }
  .team-flag { width: 22px; height: 16px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
  .team-name { font-weight: 500; font-size: 13px; }
  .pts-cell { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); }
  .pos-num { color: var(--text-muted); font-size: 12px; font-weight: 600; width: 20px; text-align: center; flex-shrink: 0; }
  .match-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .match-teams { display: flex; align-items: center; gap: 8px; }
  .match-team { flex: 1; text-align: center; }
  .match-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
  .match-flag { width: 28px; height: 20px; object-fit: cover; border-radius: 3px; margin: 4px auto; display: block; }
  .match-score { text-align: center; min-width: 60px; }
  .score-display { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; }
  .score-vs { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text-muted); letter-spacing: 2px; }
  .match-date { font-size: 11px; color: var(--text-muted); text-align: center; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; margin-top: 6px; }
  .match-result-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; margin-top: 4px; display: inline-block; }
  .badge-played { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-upcoming { background: rgba(59,111,224,0.15); color: #7da4f5; border: 1px solid rgba(59,111,224,0.3); }
  .bracket-info { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .bracket-round-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--gold); margin-bottom: 12px; }
  .bracket-match { background: var(--dark3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .bracket-team { flex: 1; display: flex; align-items: center; gap: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; }
  .bracket-score { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); min-width: 50px; text-align: center; }
  .winner-tag { background: linear-gradient(135deg, var(--gold), #a07830); color: #000; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }
  .tbd { color: var(--text-muted); font-style: italic; font-size: 13px; padding: 8px 0; }
  .update-time { text-align: center; color: var(--text-muted); font-size: 11px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; padding: 8px; margin-top: 8px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .next-match-box { margin-top: 16px; display: none; }
  .next-match-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .next-match-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; display: inline-flex; align-items: center; gap: 16px; max-width: 360px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-trophy">🏆</span>
  <h1>COPA MUNDIAL FAN 2026</h1>
  <p class="hero-sub">USA · Canada · Mexico</p>
  <div class="countdown">
    <div class="cd-box"><div class="cd-num" id="cd-days">--</div><div class="cd-label">Días</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-hours">--</div><div class="cd-label">Horas</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-mins">--</div><div class="cd-label">Mins</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-secs">--</div><div class="cd-label">Segs</div></div>
  </div>
  <span class="start-badge">⚽ Inicia 11 de Junio 2026</span>
  <div class="next-match-box" id="next-match-box">
    <div class="next-match-label">⚽ Próximo Partido</div>
    <div class="next-match-card" id="next-match-card"></div>
  </div>
</div>

<nav>
  <button class="nav-btn active" onclick="showSection('grupos',this)">Grupos</button>
  <button class="nav-btn" onclick="showSection('partidos',this)">Partidos</button>
  <button class="nav-btn" onclick="showSection('llave',this)">Llave</button>
</nav>

<div class="section active" id="sec-grupos">
  <div class="section-title">📊 Tabla de Posiciones</div>
  <div class="group-tabs" id="group-tabs"></div>
  <div id="grupos-content"><div class="loading"><div class="spinner"></div>Cargando datos...</div></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Clasificado directo</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Posible 3ro mejor</div>
  </div>
</div>

<div class="section" id="sec-partidos">
  <div class="section-title">⚽ Partidos</div>
  <div class="group-tabs" id="match-group-tabs"></div>
  <div id="partidos-content"><div class="loading"><div class="spinner"></div>Cargando partidos...</div></div>
</div>

<div class="section" id="sec-llave">
  <div class="section-title">🗓️ Fase Eliminatoria</div>
  <div id="llave-content"><div class="loading"><div class="spinner"></div>Cargando llave...</div></div>
  <button onclick="showDebug()" style="margin-top:12px;background:var(--dark3);border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;cursor:pointer">🔍 Ver diagnóstico</button>
  <div id="debug-info" style="display:none;margin-top:12px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;font-family:monospace;color:var(--text-muted);word-break:break-all"></div>
</div>

<div class="update-time" id="update-time"></div>

<script>
const SHEET_ID = '1r51eoknHH_RcuqCaUCeQ5gWw-9i5L2C_9pyFilf6f9s';
const GROUPS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const CACHE_MINS = 5;
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let allData = {};
let flags = {};
let activeGroup = 'A';
let activeMatchGroup = 'A';

function updateCountdown() {
  try {
    const target = new Date('2026-06-11T14:00:00-05:00');
    const diff = target - new Date();
    if (diff <= 0) {
      const cd = document.querySelector('.countdown');
      if (cd) cd.innerHTML = '<div class="start-badge">🔴 EN CURSO</div>';
      return;
    }
    document.getElementById('cd-days').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-mins').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-secs').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  } catch(e) { console.error(e); }
}
setInterval(updateCountdown, 1000);
updateCountdown();

function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  if (el) el.classList.add('active');
}

function parseGvizValue(cell) {
  if (!cell) return 'Fecha por definir';
  try {
    const v = cell.v;
    const f = cell.f;
    if (v === null || v === undefined) return f || 'Fecha por definir';
    if (typeof v === 'string' && v.startsWith('Date(')) {
      const parts = v.slice(5,-1).split(',').map(Number);
      const [yr, mo, dy, hr, mn] = parts;
      const ampm = hr >= 12 ? 'PM' : 'AM';
      const h12 = hr % 12 === 0 ? 12 : hr % 12;
      return `${dy} ${MONTHS[mo]} · ${h12}:${String(mn||0).padStart(2,'0')} ${ampm}`;
    }
    if (typeof v === 'number') {
      const d = new Date((v - 25569) * 86400000);
      if (!isNaN(d)) {
        const h = d.getUTCHours();
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        return `${d.getUTCDate()} ${MONTHS[d.getUTCMonth()]} · ${h12}:${String(d.getUTCMinutes()).padStart(2,'0')} ${ampm}`;
      }
      return f || String(v);
    }
    return String(v).trim() || 'Fecha por definir';
  } catch(e) {
    return 'Fecha por definir';
  }
}

async function fetchSheet(sheetName) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    return JSON.parse(text.substring(47, text.length - 2)).table;
  } catch(e) {
    console.error('Error cargando: ' + sheetName, e);
    return null;
  }
}

function parseRowsRaw(table) {
  if (!table || !table.rows) return [];
  return table.rows.map(row => row.c ? row.c.map(cell => cell) : []);
}

function cellVal(cell) {
  if (!cell) return '';
  const v = cell.v;
  const f = cell.f;
  if (v === null || v === undefined) return (f !== null && f !== undefined) ? f : '';
  return v;
}

function cellStr(cell) {
  const v = cellVal(cell);
  if (v === null || v === undefined || v === '') return '';
  return String(v).trim();
}

async function loadData() {
  try {
    const t = await fetchSheet('Equipos');
    if (t) parseRowsRaw(t).forEach(r => { const n = cellStr(r[0]); if (n) flags[n] = cellStr(r[2]); });
  } catch(e) { console.warn('flags', e); }

  for (const g of GROUPS) {
    try {
      const t = await fetchSheet('Grupo ' + g);
      allData['Grupo '+g] = t ? parseRowsRaw(t).filter(r => { const v = cellStr(r[0]); return v && v !== 'Equipo'; }) : [];
    } catch(e) { allData['Grupo '+g] = []; }
  }

  try {
    const t = await fetchSheet('Partidos');
    if (t) {
      allData['Partidos'] = parseRowsRaw(t).filter(r => {
        const grupo = cellStr(r[2]);
        return grupo.startsWith('Grupo');
      });
    }
  } catch(e) { console.warn('partidos', e); }

  for (const sh of ['Dieciseisavos','Octavos','Cuartos','Semifinal','Terceroycuarto','Final']) {
    try {
      const t = await fetchSheet(sh);
      if (t) {
        allData[sh] = parseRowsRaw(t).filter(r => {
          const v = cellStr(r[0]);
          return v && v !== 'Equipo 1' && v !== 'Equipo1' && v !== 'Equipo_1';
        });
      } else { allData[sh] = []; }
    } catch(e) { allData[sh] = []; }
  }

  buildGroupTabs();
  renderGroup(activeGroup);
  buildMatchTabs();
  renderMatches(activeMatchGroup);
  renderBracket();
  renderNextMatch();

  try {
    document.getElementById('update-time').textContent =
      `Actualizado: ${new Date().toLocaleTimeString('es-PA')} · Se actualiza cada ${CACHE_MINS} min`;
  } catch(e){}
}

function buildGroupTabs() {
  ['group-tabs','match-group-tabs'].forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    GROUPS.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'group-tab' + (g === (idx===0?activeGroup:activeMatchGroup) ? ' active' : '');
      btn.textContent = 'Grupo ' + g;
      btn.onclick = () => {
        el.querySelectorAll('.group-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (idx === 0) { activeGroup = g; renderGroup(g); }
        else { activeMatchGroup = g; renderMatches(g); }
      };
      el.appendChild(btn);
    });
  });
}

function renderGroup(g) {
  const rows = allData['Grupo '+g] || [];
  const container = document.getElementById('grupos-content');
  if (!container) return;
  if (!rows.length) { container.innerHTML = '<div class="loading">Sin datos</div>'; return; }

  const sorted = [...rows].sort((a,b) => {
    const pts = (parseFloat(cellVal(b[8]))||0) - (parseFloat(cellVal(a[8]))||0);
    if (pts !== 0) return pts;
    const dg = (parseFloat(cellVal(b[7]))||0) - (parseFloat(cellVal(a[7]))||0);
    if (dg !== 0) return dg;
    return (parseFloat(cellVal(b[5]))||0) - (parseFloat(cellVal(a[5]))||0);
  });

  let html = `<div class="standings-card"><div class="standings-header">GRUPO ${g}</div>
    <table class="standings-table"><thead><tr>
      <th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
    </tr></thead><tbody>`;

  sorted.forEach((row, i) => {
    if(!row || row.length < 1) return;
    const name = cellStr(row[0]);
    const flag = flags[name] || '';
    html += `<tr><td><div class="team-cell">
      <span class="pos-num">${i+1}</span>
      ${flag ? `<img class="team-flag" src="${flag}" alt="" onerror="this.style.display='none'">` : ''}
      <span class="team-name">${name}</span>
    </div></td>
    <td>${cellVal(row[1])||0}</td><td>${cellVal(row[2])||0}</td><td>${cellVal(row[3])||0}</td><td>${cellVal(row[4])||0}</td>
    <td>${cellVal(row[5])||0}</td><td>${cellVal(row[6])||0}</td><td>${cellVal(row[7])||0}</td>
    <td class="pts-cell">${cellVal(row[8])||0}</td></tr>`;
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function renderMatches(g) {
  const matches = (allData['Partidos']||[]).filter(r => cellStr(r[2]) === 'Grupo '+g);
  const container = document.getElementById('partidos-content');
  if (!container) return;
  if (!matches.length) { container.innerHTML = '<div class="loading">Sin partidos</div>'; return; }

  let html = '';
  matches.forEach(r => {
    if(r.length < 5) return;
    const e1 = cellStr(r[3]);
    const e2 = cellStr(r[4]);
    const g1 = cellVal(r[5]);
    const g2 = cellVal(r[6]);
    const resultado = cellStr(r[7]);
    const played = resultado !== '';
    const f1 = flags[e1]||'';
    const f2 = flags[e2]||'';
    const dateStr = parseGvizValue(r[1]);

    html += `<div class="match-card">
      <div class="match-teams">
        <div class="match-team">
          ${f1?`<img class="match-flag" src="${f1}" alt="" onerror="this.style.display='none'">`:''} 
          <div class="match-team-name">${e1}</div>
        </div>
        <div class="match-score">
          ${played ? `<div class="score-display">${g1} - ${g2}</div>` : `<div class="score-vs">VS</div>`}
        </div>
        <div class="match-team">
          ${f2?`<img class="match-flag" src="${f2}" alt="" onerror="this.style.display='none'">`:''} 
          <div class="match-team-name">${e2}</div>
        </div>
      </div>
      <div class="match-date">
        ${dateStr}
        <span class="match-result-badge ${played?'badge-played':'badge-upcoming'}">
          ${played ? '✓ JUGADO' : '⏰ PRÓXIMO'}
        </span>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function renderBracket() {
  const container = document.getElementById('llave-content');
  if (!container) return;
  
  const rounds = [
    {key:'Dieciseisavos', title:'⚽ Dieciseisavos de Final', date:'28 Jun - 3 Jul'},
    {key:'Octavos',       title:'⚽ Octavos de Final',       date:'5 - 7 Jul'},
    {key:'Cuartos',       title:'⚽ Cuartos de Final',       date:'9 - 11 Jul'},
    {key:'Semifinal',     title:'⚽ Semifinales',            date:'14 - 15 Jul'},
    {key:'Terceroycuarto',title:'🥉 Tercer Puesto',          date:'18 Jul · Miami'},
    {key:'Final',         title:'🏆 Gran Final',             date:'19 Jul · Nueva Jersey'},
  ];

  let html = '';
  rounds.forEach(round => {
    const rows = allData[round.key] || [];
    html += `<div class="bracket-info">
      <div class="bracket-round-title">${round.title}
        <span style="font-size:13px;color:var(--text-muted);font-family:'Barlow Condensed';letter-spacing:1px"> ${round.date}</span>
      </div>`;

    if (!rows.length) {
      html += `<div class="tbd">Por definir</div>`;
    } else {
      rows.forEach(r => {
        if (!r || r.length < 2) return;

        const e1 = cellStr(r[0]);
        const e2 = cellStr(r[1]);
        
        const g1raw = r[2] ? cellVal(r[2]) : '';
        const g2raw = r[3] ? cellVal(r[3]) : '';
        
        const g1 = (g1raw !== null && g1raw !== undefined && g1raw !== '') ? g1raw : null;
        const g2 = (g2raw !== null && g2raw !== undefined && g2raw !== '') ? g2raw : null;
        
        const played = g1 !== null && g2 !== null;
        
        let w1 = false;
        let w2 = false;
        
        if (played) {
          const numG1 = parseFloat(g1) || 0;
          const numG2 = parseFloat(g2) || 0;
          if (numG1 > numG2) {
            w1 = true;
          } else if (numG2 > numG1) {
            w2 = true;
          } else {
            if (r.length > 6) {
              const ganStr = cellStr(r[6]);
              if (ganStr === e1) w1 = true;
              else if (ganStr === e2) w2 = true;
            }
          }
        }

        const f1 = flags[e1]||'';
        const f2 = flags[e2]||'';

        html += `<div class="bracket-match">
          <div class="bracket-team" style="${w1?'color:var(--gold);font-weight:700;':''}">
            ${f1?`<img class="team-flag" src="${f1}" alt="" onerror="this.style.display='none'">`:''} 
            ${e1||'<span class="tbd">Por definir</span>'}
            ${w1?'<span class="winner-tag">GANADOR</span>':''}
          </div>
          <div class="bracket-score">${played ? `${g1} - ${g2}` : '<span style="font-size:12px;color:var(--text-muted)">VS</span>'}</div>
          <div class="bracket-team" style="justify-content:flex-end;text-align:right;${w2?'color:var(--gold);font-weight:700;':''}">
            ${w2?'<span class="winner-tag">GANADOR</span>':''}
            ${e2||'<span class="tbd">Por definir</span>'}
            ${f2?`<img class="team-flag" src="${f2}" alt="" onerror="this.style.display='none'">`:''} 
          </div>
        </div>`;
      });
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderNextMatch() {
  try {
    const upcoming = (allData['Partidos']||[]).filter(r => cellStr(r[7]) === '');
    if (!upcoming.length) return;
    const next = upcoming[0];
    const e1 = cellStr(next[3]);
    const e2 = cellStr(next[4]);
    const fecha = parseGvizValue(next[1]);
    const grupo = cellStr(next[2]);
    const f1 = flags[e1]||'';
    const f2 = flags[e2]||'';

    const box = document.getElementById('next-match-box');
    const card = document.getElementById('next-match-card');
    if (!box || !card) return;
    box.style.display = 'block';
    card.innerHTML = `
      <div style="text-align:center">
        ${f1?`<img src="${f1}" style="width:28px;height:20px;object-fit:cover;border-radius:3px;margin-bottom:4px" onerror="this.style.display='none'">`:''} 
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700">${e1}</div>
      </div>
      <div style="text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#8892a4;letter-spacing:1px">${grupo}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#C9A84C">${fecha}</div>
      </div>
      <div style="text-align:center">
        ${f2?`<img src="${f2}" style="width:28px;height:20px;object-fit:cover;border-radius:3px;margin-bottom:4px" onerror="this.style.display='none'">`:''} 
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700">${e2}</div>
      </div>`;
  } catch(e) { console.error(e); }
}

function showDebug() {
  const el = document.getElementById('debug-info');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  const sheets = ['Dieciseisavos','Octavos','Cuartos','Semifinal','Terceroycuarto','Final'];
  let info = '';
  sheets.forEach(sh => {
    const rows = allData[sh] || [];
    info += `<b>${sh}:</b> ${rows.length} filas`;
    if (rows.length > 0) {
      info += ` | fila1: [${rows[0].map(c => c ? (c.v !== undefined ? c.v : '?') : 'null').join(', ')}]`;
    }
    info += '<br>';
  });
  info += `<br><b>Partidos:</b> ${(allData['Partidos']||[]).length} filas`;
  el.innerHTML = info || 'Sin datos cargados';
}

loadData();
setInterval(loadData, CACHE_MINS * 60 * 1000);
</script>
</body>
</html>
